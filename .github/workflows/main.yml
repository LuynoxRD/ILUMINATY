name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Resolve site URL
        env:
          CONFIGURED_SITE_URL: ${{ vars.VITE_SITE_URL }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
        run: |
          if [ -n "$CONFIGURED_SITE_URL" ]; then
            echo "VITE_SITE_URL=$CONFIGURED_SITE_URL" >> "$GITHUB_ENV"
          elif [ "$REPOSITORY_NAME" = "${REPOSITORY_OWNER}.github.io" ]; then
            echo "VITE_SITE_URL=https://${REPOSITORY_OWNER}.github.io" >> "$GITHUB_ENV"
          else
            echo "VITE_SITE_URL=https://${REPOSITORY_OWNER}.github.io/${REPOSITORY_NAME}" >> "$GITHUB_ENV"
          fi
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
